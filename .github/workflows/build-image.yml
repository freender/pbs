name: Build PBS Image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Read tracked version
        id: version
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/freender/pbs
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.value }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          build-args: |
            PBS_VERSION=${{ steps.version.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect workflow file changes
        id: workflow_changes
        run: |
          set -euo pipefail
          workflow_touched=false
          while IFS= read -r path; do
            if [[ "$path" == .github/workflows/* ]]; then
              workflow_touched=true
              break
            fi
          done < <(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")
          echo "value=$workflow_touched" >> "$GITHUB_OUTPUT"

      - name: Create version tag
        if: ${{ steps.workflow_changes.outputs.value != 'true' }}
        run: |
          set -euo pipefail
          version_tag="v${{ steps.version.outputs.value }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${version_tag}" >/dev/null 2>&1; then
            echo "Tag $version_tag already exists"
          else
            git tag -a "$version_tag" -m "PBS ${{ steps.version.outputs.value }}"
            git push origin "$version_tag"
          fi

      - name: Move latest tag
        if: ${{ steps.workflow_changes.outputs.value != 'true' }}
        run: |
          set -euo pipefail
          git tag -fa latest -m "Latest PBS ${{ steps.version.outputs.value }}"
          git push origin latest --force

      - name: Note skipped tag updates
        if: ${{ steps.workflow_changes.outputs.value == 'true' }}
        run: |
          set -euo pipefail
          echo "Skipping tag updates because this commit modifies workflow files and GITHUB_TOKEN cannot push refs to those commits without workflows permission."
