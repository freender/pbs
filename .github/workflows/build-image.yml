name: Build PBS Image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read tracked version
        id: version
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/freender/pbs
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.value }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          build-args: |
            PBS_VERSION=${{ steps.version.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create version tag
        run: |
          set -euo pipefail
          version_tag="v${{ steps.version.outputs.value }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${version_tag}" >/dev/null 2>&1; then
            echo "Tag $version_tag already exists"
          else
            git tag -a "$version_tag" -m "PBS ${{ steps.version.outputs.value }}"
            git push origin "$version_tag"
          fi

      - name: Move latest tag
        run: |
          set -euo pipefail
          git tag -fa latest -m "Latest PBS ${{ steps.version.outputs.value }}"
          git push origin latest --force
