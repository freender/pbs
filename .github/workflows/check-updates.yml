name: Check PBS Updates

on:
  schedule:
    - cron: '15 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve latest PBS package version
        id: latest
        run: |
          set -euo pipefail
          packages="$(curl -fsSL http://download.proxmox.com/debian/pbs/dists/trixie/pbs-no-subscription/binary-amd64/Packages.gz | gzip -dc)"
          latest_version="$(awk '/^Package: proxmox-backup-server$/ {found=1} found && /^Version:/ {print $2; exit}' <<< "$packages")"
          if [ -z "$latest_version" ]; then
            echo "Failed to resolve latest proxmox-backup-server version" >&2
            exit 1
          fi
          echo "latest=$latest_version" >> "$GITHUB_OUTPUT"

      - name: Read tracked version
        id: current
        run: |
          set -euo pipefail
          current_version="$(tr -d '[:space:]' < VERSION)"
          echo "current=$current_version" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        if: ${{ steps.latest.outputs.latest != steps.current.outputs.current }}
        env:
          NEW_VERSION: ${{ steps.latest.outputs.latest }}
        run: |
          set -euo pipefail
          printf '%s\n' "$NEW_VERSION" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump PBS to $NEW_VERSION"
          git push
