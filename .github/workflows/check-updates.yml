name: Check PBS Updates

on:
  schedule:
    - cron: '15 8 * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve latest PBS package version
        id: latest
        run: |
          set -euo pipefail
          latest_version="$(
            curl -fsSL http://download.proxmox.com/debian/pbs/dists/trixie/pbs-no-subscription/binary-amd64/Packages.gz |
              gzip -dc |
              awk '/^Package: proxmox-backup-server$/ {found=1} found && /^Version:/ {print $2; found=0}' |
              sort -V |
              awk 'NF {latest=$0} END {print latest}'
          )"
          if [ -z "$latest_version" ]; then
            echo "Failed to resolve latest proxmox-backup-server version" >&2
            exit 1
          fi
          echo "latest=$latest_version" >> "$GITHUB_OUTPUT"

      - name: Read tracked version
        id: current
        run: |
          set -euo pipefail
          current_version="$(tr -d '[:space:]' < VERSION)"
          echo "current=$current_version" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        if: ${{ steps.latest.outputs.latest != steps.current.outputs.current }}
        env:
          NEW_VERSION: ${{ steps.latest.outputs.latest }}
        run: |
          set -euo pipefail
          printf '%s\n' "$NEW_VERSION" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump PBS to $NEW_VERSION"
          git push

      - name: Trigger image build
        if: ${{ steps.latest.outputs.latest != steps.current.outputs.current }}
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/build-image.yml/dispatches" \
            -d "{\"ref\":\"$DEFAULT_BRANCH\"}"
